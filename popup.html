<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Hourglass Sync</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --accent: rgb(158, 139, 94);
        --accent-dark: rgb(130, 114, 76);
        --accent-soft: rgba(158, 139, 94, 0.12);
        --success: #1f7a4d;
        --success-soft: rgba(31, 122, 77, 0.12);
        --danger: #721c24;
        --danger-soft: #f8d7da;
        --background: #fdfaf3;
        --text-color: #333;
        --card: rgba(255, 255, 255, 0.9);
      }

      body {
        font-family: "Inter", sans-serif;
        padding: 16px;
        width: 340px;
        background:
          radial-gradient(circle at top left, rgba(158, 139, 94, 0.16), transparent 38%),
          radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.72), transparent 42%),
          var(--background);
        color: var(--text-color);
      }

      .shell {
        display: grid;
        gap: 12px;
      }

      .panel {
        background: var(--card);
        border: 1px solid rgba(158, 139, 94, 0.16);
        border-radius: 16px;
        box-shadow: 0 14px 32px rgba(63, 47, 14, 0.08);
        backdrop-filter: blur(6px);
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        padding: 16px 16px 0;
      }

      .title {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .title::before {
        content: "";
        display: inline-block;
        width: 4px;
        height: 16px;
        border-radius: 2px;
        background: var(--accent);
      }

      .subtitle {
        margin: 6px 0 0;
        font-size: 12px;
        color: rgba(51, 51, 51, 0.7);
        line-height: 1.45;
      }

      .header-action {
        background: transparent;
        border: 1px solid rgba(158, 139, 94, 0.22);
        color: var(--accent-dark);
        border-radius: 10px;
        padding: 6px 10px;
        font-size: 14px;
        line-height: 1;
        cursor: pointer;
        width: auto;
        flex: 0 0 auto;
        transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
      }

      .header-action:hover {
        background: var(--accent-soft);
        border-color: var(--accent);
      }

      .header-action:active {
        transform: translateY(1px);
      }

      .content {
        padding: 14px 16px 16px;
      }

      .field-label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: rgba(51, 51, 51, 0.55);
        margin: 0 0 6px;
      }

      .message-box {
        display: none;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 12px;
        line-height: 1.4;
        margin-bottom: 12px;
      }

      .message-box.show {
        display: block;
      }

      .message-box[data-kind="error"] {
        background: var(--danger-soft);
        color: var(--danger);
        border: 1px solid rgba(114, 28, 36, 0.18);
      }

      .message-box[data-kind="success"] {
        background: var(--success-soft);
        color: var(--success);
        border: 1px solid rgba(31, 122, 77, 0.18);
      }

      .message-box[data-kind="info"] {
        background: var(--accent-soft);
        color: var(--accent-dark);
        border: 1px solid rgba(158, 139, 94, 0.18);
      }

      textarea {
        width: 100%;
        padding: 12px 14px;
        font-family: inherit;
        font-size: 13px;
        line-height: 1.5;
        border: 1px solid rgba(158, 139, 94, 0.22);
        border-radius: 12px;
        resize: vertical;
        min-height: 96px;
        box-sizing: border-box;
        margin-bottom: 14px;
        background-color: #fffef9;
        color: var(--text-color);
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      textarea::placeholder {
        color: rgba(51, 51, 51, 0.4);
      }

      button {
        width: 100%;
        padding: 10px;
        background-color: var(--accent);
        color: white;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.2s ease;
      }

      button:hover {
        background-color: var(--accent-dark);
      }

      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }

      .primary-button {
        padding: 11px 14px;
        background: linear-gradient(180deg, var(--accent), var(--accent-dark));
        border-radius: 10px;
        letter-spacing: 0.01em;
        box-shadow: 0 4px 12px rgba(130, 114, 76, 0.18);
        transition: transform 0.1s ease, box-shadow 0.15s ease, opacity 0.15s ease, background 0.15s ease;
      }

      .primary-button:hover {
        background: linear-gradient(180deg, var(--accent-dark), var(--accent-dark));
        box-shadow: 0 6px 16px rgba(130, 114, 76, 0.26);
      }

      .primary-button:active {
        transform: translateY(1px);
        box-shadow: 0 2px 8px rgba(130, 114, 76, 0.22);
      }

      .primary-button:disabled {
        background: #cfc7b4;
        box-shadow: none;
        opacity: 0.9;
      }

      .secondary-button {
        background: transparent;
        color: var(--accent-dark);
        border: 1px solid rgba(158, 139, 94, 0.24);
      }

      .secondary-button:hover {
        background: rgba(158, 139, 94, 0.08);
      }

      .preview-panel {
        display: none;
        border-top: 1px solid rgba(158, 139, 94, 0.12);
        margin-top: 12px;
        padding-top: 12px;
      }

      .preview-panel.show {
        display: block;
      }

      .preview-summary {
        display: grid;
        gap: 8px;
      }

      .candidate-picker {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }

      .candidate-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(158, 139, 94, 0.08);
        background: #fffef9;
        margin-bottom: 8px;
        font-size: 12px;
        transition: border-color 0.15s ease, background 0.15s ease;
      }

      .candidate-header {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        gap: 8px;
      }

      .candidate-body {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .candidate-row.selected {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .delete-match-picker {
        display: grid;
        gap: 6px;
        margin-top: 8px;
      }

      .delete-match-row {
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid rgba(158, 139, 94, 0.08);
        background: #fffef9;
        font-size: 12px;
        transition: border-color 0.15s ease, background 0.15s ease;
      }

      .delete-match-row.selected {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .candidate-label {
        flex: 1;
        color: rgba(51, 51, 51, 0.9);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
      }

      .candidate-index {
        font-weight: 600;
        color: rgba(51, 51, 51, 0.6);
      }

      .op-tag {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .op-tag-create {
        background: var(--success-soft);
        color: var(--success);
      }

      .op-tag-delete {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .op-tag-unknown {
        background: rgba(120, 120, 120, 0.15);
        color: rgba(60, 60, 60, 0.9);
      }

      .candidate-address {
        flex: 1;
      }

      .match-info {
        font-size: 11px;
        color: rgba(51, 51, 51, 0.6);
      }

      .match-warning {
        font-size: 11px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 4px;
        background: var(--accent-soft);
        color: var(--accent-dark);
      }

      .candidate-actions {
        display: flex;
        gap: 8px;
        flex: 0 0 auto;
      }

      .accept-button {
        padding: 6px 10px;
        background: var(--success);
        color: white;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 600;
      }

      .accept-button:hover {
        background: #16663f;
      }

      .candidate-picker label {
        font-size: 12px;
        font-weight: 600;
        color: rgba(51, 51, 51, 0.72);
      }

      .candidate-picker select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(158, 139, 94, 0.22);
        background: #fffef9;
        color: var(--text-color);
        font-size: 12px;
      }

      .preview-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 12px;
        line-height: 1.4;
      }

      .preview-label {
        color: rgba(51, 51, 51, 0.68);
        flex: 0 0 42%;
      }

      .preview-value {
        text-align: right;
        flex: 1;
        word-break: break-word;
      }

      .preview-value.editable {
        cursor: text;
        border-bottom: 1px dashed rgba(158, 139, 94, 0.45);
        padding: 0 2px;
        border-radius: 2px;
        transition: background 120ms ease, border-color 120ms ease;
      }

      .preview-value.editable:hover {
        background: rgba(158, 139, 94, 0.08);
      }

      .preview-value.editable:focus {
        outline: none;
        background: rgba(158, 139, 94, 0.12);
        border-bottom-color: rgba(158, 139, 94, 0.9);
      }

      .preview-json {
        margin: 12px 0 0;
        padding: 12px;
        border-radius: 12px;
        background: rgba(248, 245, 237, 0.92);
        border: 1px solid rgba(158, 139, 94, 0.16);
        font-size: 11px;
        line-height: 1.5;
        overflow: auto;
        max-height: 200px;
        white-space: pre-wrap;
      }

    </style>
  </head>
  <body>
    <div class="shell">
      <div class="panel">
        <div class="panel-header">
          <div>
            <p class="title">Hourglass Sync</p>
            <p class="subtitle">Review and submit address changes to your territory.</p>
          </div>
          <button id="openSettings" class="header-action" type="button" aria-label="Configurar backend" title="Configurar backend">⚙</button>
        </div>
        <div class="content">
          <div id="messageBox" class="message-box"></div>
          <label class="field-label" for="addressInput">Endereço bruto</label>
          <textarea
            id="addressInput"
            rows="4"
            placeholder="Cole um ou mais endereços para processar..."
          ></textarea>
          <button id="fillButton" class="primary-button">Pré-visualizar</button>
        </div>
      </div>

      <div id="previewPanel" class="panel preview-panel">
        <div class="content">
          <p class="title">Preview before submit</p>
          <p class="subtitle">This is the exact payload that will be sent to Hourglass.</p>
          <div id="candidatePicker" class="candidate-picker" hidden>
            <label>Normalized address candidates</label>
            <div id="candidateList" role="list" aria-label="Normalized address candidates"></div>
          </div>
          <div id="previewSummary" class="preview-summary"></div>
          <pre id="previewJson" class="preview-json"></pre>
        </div>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
